<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listings | Shelters Realty</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Airtable Property Listings Grid (if not in styles.css) */
        .property-grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            margin-top: 2rem;
        }
        .property-card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        .property-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f3f4f6;
        }
        .property-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .property-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1E293B;
            margin: 0;
        }
        .property-location {
            font-size: 1rem;
            color: #2563eb;
            font-weight: 500;
        }
        .property-price {
            font-size: 1rem;
            color: #059669;
            font-weight: 600;
        }
        .property-description {
            font-size: 0.95rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        .loading, .error, .no-listings {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Shelters</span>
                <span class="logo-accent">Realty</span>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="listings.html" class="nav-link active">Properties</a>
                <a href="agreements.html" class="nav-link">Agreements</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="theme-text light-text">Light</span>
                <span class="toggle-switch">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="theme-text dark-text">Dark</span>
            </button>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>
    <main>
        <section class="property-listings-section">
            <div class="container">
                <h2 class="section-title">Latest Properties</h2>
                <div id="property-listings"></div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Shelters Realty</h3>
                    <p>Your trusted East Pune property experts with 30+ years of local experience and cutting-edge technology.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="listings.html">Properties</a></li>
                        <li><a href="about.html">About Us</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <!-- Airtable CMS Integration -->
    <script src="script.js"></script>
    <script src="js/airtable.js"></script>
</body>
</html>
