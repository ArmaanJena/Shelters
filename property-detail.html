<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details | Shelters Realty</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .property-detail-container {
            max-width: 900px;
            margin: 2rem auto;
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            padding: 2rem;
        }
        .property-detail-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .property-detail-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 1rem;
            background: #f3f4f6;
        }
        .property-detail-info {
            margin-top: 1.5rem;
        }
        .property-detail-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1E293B;
        }
        .property-detail-location {
            font-size: 1.1rem;
            color: #2563eb;
            font-weight: 500;
        }
        .property-detail-price {
            font-size: 1.3rem;
            color: #059669;
            font-weight: 600;
        }
        .property-detail-description {
            font-size: 1.05rem;
            color: #64748b;
            margin-top: 1rem;
        }
        .whatsapp-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
            background: #25D366;
            color: #fff;
            width: 58px;
            height: 58px;
            border-radius: 999px;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 12px 24px rgba(37, 211, 102, 0.28);
        }
        .whatsapp-cta:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Shelters</span>
                <span class="logo-accent">Realty</span>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="listings.html" class="nav-link">Properties</a>
                <a href="areas.html" class="nav-link">Areas</a>
                <a href="agreements.html" class="nav-link">Agreements</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>
    <main>
        <div class="property-detail-container" id="property-detail-container">
            <div class="loading">Loading property details...</div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Shelters Realty</h3>
                    <p>Your trusted East Pune property experts with 30+ years of local experience and cutting-edge technology.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="listings.html">Properties</a></li>
                        <li><a href="about.html">About Us</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script src="property-detail.js"></script>
</body>
</html>
